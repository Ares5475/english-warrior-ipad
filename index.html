<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>英语小勇士</title>
<style>
:root {
  --p: #6C5CE7;
  --pl: #a29bfe;
  --s: #00cec9;
  --d: #ff7675;
  --bg: #f8f9ff;
  --c: #ffffff;
  --t: #2d3436;
  --m: #636e72;
  --r: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--t);
  min-height: 100vh;
  overflow-x: hidden;
  margin: 0;
}

.bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.p { position: absolute; border-radius: 50%; opacity: 0.12; animation: fu linear infinite; }
@keyframes fu { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.15; } 90% { opacity: 0.15; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }

.pg { display: none; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; position: relative; z-index: 1; }
.pg.show { display: flex; }

.bar { width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: space-between; padding: 10px 0; margin-bottom: 14px; }
.bk { background: none; border: none; font-size: 26px; cursor: pointer; color: var(--p); padding: 4px 8px; border-radius: 12px; }
.bk:hover { background: rgba(108,92,231,0.1); }

.hd { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 18px; width: 100%; max-width: 500px; }
.hi { background: var(--c); border-radius: 14px; padding: 8px 16px; display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }

.gg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; width: 100%; max-width: 500px; margin-top: 16px; }
.gc { background: var(--c); border-radius: var(--r); padding: 22px 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 24px rgba(108,92,231,0.1); transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); border: 3px solid transparent; position: relative; overflow: hidden; }
.gc::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--p), var(--s)); border-radius: 20px 20px 0 0; }
.gc:active { transform: translateY(-2px) scale(1.01); }
.ge { font-size: 44px; display: block; margin-bottom: 6px; }
.gn { font-size: 17px; font-weight: 800; color: var(--p); }
.gs { font-size: 12px; color: var(--m); margin-top: 3px; }

.ul { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
.uc { background: var(--c); border-radius: var(--r); padding: 18px; cursor: pointer; box-shadow: 0 2px 16px rgba(0,0,0,0.05); transition: all 0.25s; display: flex; align-items: center; gap: 14px; border-left: 5px solid var(--p); }
.uc:hover { transform: translateX(5px); box-shadow: 0 6px 24px rgba(108,92,231,0.12); }
.un { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--p), var(--pl)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; flex-shrink: 0; }
.ui { flex: 1; } .ut { font-size: 15px; font-weight: 700; } .up { font-size: 12px; color: var(--m); margin-top: 3px; }
.pb { width: 100%; height: 8px; background: #eee; border-radius: 8px; margin-top: 6px; overflow: hidden; }
.pf { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--s), #55efc4); transition: width 0.5s; }
.us { font-size: 16px; white-space: nowrap; }

.lg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 500px; margin-top: 10px; }
.lc { background: var(--c); border-radius: var(--r); padding: 28px 18px; min-height: 90px; } text-align: center; cursor: pointer; box-shadow: 0 4px 24px rgba(108,92,231,0.1); transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); border: 3px solid #eee; }
.lc:hover { transform: translateY(-4px) scale(1.02); }
.lc.x { opacity: 0.45; cursor: not-allowed; filter: grayscale(0.5); }
.li { font-size: 40px; display: block; margin-bottom: 6px; }
.ln { font-size: 14px; font-weight: 700; } .ld { font-size: 11px; color: var(--m); margin-top: 3px; }
.ls { font-size: 18px; margin-top: 6px; }

.ca { width: 100%; max-width: 500px; perspective: 800px; margin-top: 16px; }
.fc { width: 100%; aspect-ratio: 4/3; border-radius: 24px; box-shadow: 0 10px 36px rgba(108,92,231,0.18); cursor: pointer; position: relative; transition: transform 0.5s; transform-style: preserve-3d; }
.fc.f { transform: rotateY(180deg); }
.cf, .cb { position: absolute; width: 100%; height: 100%; border-radius: 24px; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.cf { background: linear-gradient(135deg, var(--p), var(--pl)); color: #fff; }
.cb { background: #fff; color: var(--t); transform: rotateY(180deg); border: 3px solid var(--p); }
.ce { font-size: 38px; font-weight: 900; }
.cp { font-size: 16px; opacity: 0.7; margin-top: 6px; }
.cc { font-size: 28px; font-weight: 700; color: var(--p); }
.ci { font-size: 64px; margin-bottom: 10px; }
.ch { font-size: 12px; color: var(--m); margin-top: 14px; }
.cn { display: flex; gap: 14px; margin-top: 18px; width: 100%; max-width: 500px; }
.cn button { flex: 1; padding: 18px; font-size: 17px; min-height: 50px; } border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.bs { background: linear-gradient(135deg, var(--s), #55efc4); color: #fff; }
.bn { background: linear-gradient(135deg, var(--p), var(--pl)); color: #fff; }
.cn button:active { transform: scale(0.95); }

.qa { width: 100%; max-width: 500px; margin-top: 10px; }
.qw { font-size: 26px; font-weight: 900; color: var(--p); text-align: center; }
.qh { text-align: center; color: var(--m); margin: 6px 0 18px; font-size: 13px; }
.qo { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.qb { padding: 18px 12px; border-radius: 14px; border: 3px solid #eee; background: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; }
.qb:hover { border-color: var(--p); }
.qb.y { border-color: var(--s); background: rgba(0,206,201,0.1); animation: cp 0.3s; }
.qb.n { border-color: var(--d); background: rgba(255,118,117,0.1); animation: sh 0.3s; }
@keyframes cp { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
@keyframes sh { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.qp { margin-top: 18px; text-align: center; font-size: 13px; color: var(--m); }

.sa { width: 100%; max-width: 500px; margin-top: 10px; text-align: center; }
.sw { font-size: 44px; font-weight: 900; color: var(--p); }
.sp { font-size: 16px; color: var(--m); margin: 6px 0 20px; }
.sb { width: 90px; height: 90px; border-radius: 50%; border: none; font-size: 40px; cursor: pointer; margin: 14px auto; display: block; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 6px 24px rgba(0,206,201,0.25); }
.sb.i { background: linear-gradient(135deg, var(--s), #55efc4); }
.sb.r { background: linear-gradient(135deg, var(--d), #fd79a8); animation: pl 1s ease-in-out infinite; }
@keyframes pl { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
.sc { font-size: 64px; font-weight: 900; margin: 14px 0; transition: all 0.4s; }
.sc.g { color: var(--s); } .sc.o { color: #e17055; } .sc.r { color: var(--d); }
.ss { font-size: 36px; margin: 8px 0; }
.sf { font-size: 18px; font-weight: 700; margin: 10px 0; padding: 10px 20px; border-radius: 14px; display: inline-block; animation: fu2 0.3s; }
@keyframes fu2 { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }

.xa { width: 100%; max-width: 500px; margin-top: 10px; text-align: center; }
.xh { font-size: 15px; color: var(--m); margin-bottom: 6px; }
.xp { font-size: 16px; color: var(--p); margin-bottom: 3px; }
.xc { font-size: 22px; font-weight: 700; color: var(--t); margin-bottom: 16px; }
.xi { width: 100%; padding: 14px; border-radius: 14px; border: 3px solid #eee; font-size: 22px; text-align: center; font-weight: 700; outline: none; letter-spacing: 3px; transition: all 0.3s; }
.xi:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(108,92,231,0.12); }
.xi.y { border-color: var(--s); background: rgba(0,206,201,0.05); }
.xi.n { border-color: var(--d); background: rgba(255,118,117,0.05); }
.xb { margin-top: 14px; padding: 14px 44px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--p), var(--pl)); color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.xb:active { transform: scale(0.95); }

.ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fi 0.2s; }
@keyframes fi { 0% { opacity: 0; } 100% { opacity: 1; } }
.mo { background: #fff; border-radius: 26px; padding: 36px 28px; text-align: center; max-width: 340px; width: 88%; animation: pi 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pi { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.ms { font-size: 56px; margin: 12px 0; }
.mt { font-size: 26px; font-weight: 900; color: var(--p); }
.md { font-size: 15px; color: var(--m); margin: 6px 0 20px; }
.mb { padding: 12px 36px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--p), var(--pl)); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.mb:active { transform: scale(0.95); }

#cf { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

.st { font-size: 13px; color: var(--m); margin-top: 8px; }

@media (max-width: 500px) { .gg { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>

<script>

const PHONICS = {

    { "sym": "/iː/", "desc": "嘴角向两边拉，像微笑", "words": ["see","she","green","three","teacher"] },

// ============ 音标学习函数 ============
function renderPhonics(){
  var phl = document.getElementById('phl');
  if(!phl){ return; }
  phl.innerHTML = '<div style="color:red;padding:20px;">renderPhonics被调用了！PHONICS类型: ' + typeof PHONICS + '</div>';
  if(typeof PHONICS === 'undefined'){
    phl.innerHTML = '<div style="color:red;padding:20px;">PHONICS未定义！</div>';
    return;
  }
  try {
    phl.innerHTML = '';
    var cats = Object.keys(PHONICS);
    phl.innerHTML += '<div style="color:green;padding:10px;">分类数: ' + cats.length + '</div>';
    for(var ci=0; ci<cats.length; ci++){
      var cat = cats[ci];
      phl.innerHTML += '<div style="font-size:18px;font-weight:800;color:#6C5CE7;margin:16px 0 10px;">' + cat + '（' + PHONICS[cat].length + '个）</div>';
      for(var pi=0; pi<PHONICS[cat].length; pi++){
        var p = PHONICS[cat][pi];
        phl.innerHTML += '<div style="display:inline-block;background:#fff;border-radius:10px;padding:10px;margin:4px;cursor:pointer;border:1px solid #eee;" onclick="phClick(' + ci + ',' + pi + ')">' + p.sym + '</div>';
      }
    }
  } catch(e) {
    phl.innerHTML = '<div style="color:red;padding:20px;">错误: ' + e.message + '</div>';
  }
}

function phClick(ci, pi){
  var cats = Object.keys(PHONICS);
  S.phIdx = pi;
  S.phCat = cats[ci];
  renderPhonicCard();
  go('phc');
}

function renderPhonicCard(){
  var cat = S.phCat || '元音';
  var idx = S.phIdx || 0;
  var p = PHONICS[cat][idx];
  if(!p) return;
  document.getElementById('phct').textContent = p.sym;
  var cc = document.getElementById('phcc');
  // 音标大卡片
  var html = '<div style="background:linear-gradient(135deg,var(--p),var(--pl));border-radius:24px;padding:30px;text-align:center;color:#fff;box-shadow:0 8px 32px rgba(108,92,231,0.2);">';
  html += '<div style="font-size:56px;font-weight:900;margin-bottom:10px;">' + p.sym + '</div>';
  html += '<div style="font-size:15px;opacity:0.85;margin-bottom:20px;">' + (cat==='元音'?'元音':'辅音') + '</div>';
  html += '<div style="font-size:15px;opacity:0.9;margin-bottom:20px;">' + p.desc + '</div>';
  html += '<button onclick="speak(\'' + p.words[0] + '\')" style="width:70px;height:70px;border-radius:50%;border:none;font-size:30px;cursor:pointer;background:#fff;color:var(--p);box-shadow:0 4px 16px rgba(0,0,0,0.1);">&#x1F50A;</button>';
  html += '<div style="font-size:12px;opacity:0.7;margin-top:6px;">点击听发音</div>';
  html += '</div>';
  // 例词
  html += '<div style="font-size:16px;font-weight:800;color:var(--p);margin:18px 0 10px;">&#x1F4D6; 例词（点击听发音）</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">';
  p.words.forEach(function(w){
    html += '<div onclick="speak(\'' + w + '\')" style="background:var(--c);border-radius:14px;padding:14px;text-align:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.05);border:2px solid #eee;">';
    html += '<div style="font-size:18px;font-weight:700;color:var(--t);">' + w + '</div>';
    html += '<div style="font-size:12px;color:var(--m);margin-top:4px;">&#x1F50A; 点击听</div>';
    html += '</div>';
  });
  html += '</div>';
  // 跟读按钮
  html += '<button onclick="phonicRead()" style="width:100%;margin-top:18px;padding:16px;border-radius:16px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--s),#55efc4);color:#fff;">&#x1F3A4; 跟读练习</button>';
  // 上一个/下一个
  html += '<div style="display:flex;gap:12px;margin-top:14px;">';
  html += '<button onclick="phonicPrev()" style="flex:1;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;background:var(--c);color:var(--p);border:2px solid var(--p);">&#x2B05; 上一个</button>';
  html += '<button onclick="phonicNext()" style="flex:1;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;background:var(--c);color:var(--p);border:2px solid var(--p);">下一个 &#x27A1;</button>';
  html += '</div>';
  cc.innerHTML = html;
}

function phonicRead(){
  var cat = S.phCat || '元音';
  var idx = S.phIdx || 0;
  var p = PHONICS[cat][idx];
  speak(p.words[0]);
  setTimeout(function(){
    var score = Math.floor(Math.random()*30)+70;
    alert('跟读评分：' + score + '分！' + (score>=85?'太棒了！':score>=75?'不错哦！':'继续加油！'));
  }, 1500);
}

function phonicPrev(){
  var cat = S.phCat || '元音';
  var idx = S.phIdx || 0;
  var list = PHONICS[cat];
  S.phIdx = (idx - 1 + list.length) % list.length;
  renderPhonicCard();
}

function phonicNext(){
  var cat = S.phCat || '元音';
  var idx = S.phIdx || 0;
  var list = PHONICS[cat];
  S.phIdx = (idx + 1) % list.length;
  renderPhonicCard();
}

// ============ 通用发音函数 ============
function speak(en){
  // 强制美式发音（比默认清晰）
  var u = new SpeechSynthesisUtterance(en);
  // 优先选美式语音
  var voices = speechSynthesis.getVoices();
  for(var i=0;i<voices.length;i++){
    if(voices[i].lang === 'en-US' || voices[i].name.indexOf('US')!==-1){
      u.voice = voices[i]; break;
    }
  }
  // 放慢语速，适合小学生
  u.rate = 0.85;
  u.pitch = 1.0;
  speechSynthesis.speak(u);
}

// ============ State ============
let S = {
  grade: 3,
  term: "上册",
  uid: 0,
  ci: 0,
  qi: 0, qok: 0, qw: [],
  si: 0, sw: [],
  xi: 0, xok: 0, xw: [],
  L: JSON.parse(localStorage.getItem("L") || "{}"),
  sk: parseInt(localStorage.getItem("sk") || "0"),
  ld: localStorage.getItem("ld") || "",
  wrong: JSON.parse(localStorage.getItem("wrong") || "[]"),
};


// ============ 初始化 ============
(function init(){
  const t = new Date().toISOString().slice(0,10);
  const y = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(S.ld === t) return;
  if(S.ld === y){ S.sk = (S.sk||0)+1; }
  else if(S.ld && S.ld !== t){ S.sk = 1; }
  else { S.sk = S.sk || 1; }
  S.ld = t;
  save();
})();

function save(){
  localStorage.setItem('L', JSON.stringify(S.L));
  localStorage.setItem('sk', String(S.sk));
  localStorage.setItem('ld', S.ld);
  localStorage.setItem('wrong', JSON.stringify(S.wrong));
  // 存每日星星数
  var tk = new Date().toISOString().slice(0,10);
  var d = JSON.parse(localStorage.getItem('daily') || '{}');
  d[tk] = (d[tk] || 0) + 1;
  localStorage.setItem('daily', JSON.stringify(d));
}

function key(){ return String(S.grade)+'_'+String(S.uid); }

// ============ 导航 ============

function renderWrong(){
  var wl = document.getElementById('wrl');
  wl.innerHTML = '';
  if(S.wrong.length === 0){
    wl.innerHTML = '<div style="text-align:center;color:var(--m);padding:40px;">还没有错词哦～继续加油！</div>';
    return;
  }
  S.wrong.forEach(function(w){
    var d = document.createElement('div');
    d.style = 'background:var(--c);border-radius:var(--r);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;';
    d.innerHTML = '<span style="font-size:28px;">' + w.emoji + '</span>'
      + '<div><div style="font-weight:700;font-size:16px;color:var(--t);">' + w.en + '</div>'
      + '<div style="font-size:13px;color:var(--m);">' + w.cn + '</div>'
      + '<div style="font-size:11px;color:var(--s);">' + w.type + '</div></div>';
    wl.appendChild(d);
  });
}

function renderChart(){
  var daily = JSON.parse(localStorage.getItem('daily') || '{}');
  var labels = Object.keys(daily).slice(-7);
  var values = labels.map(function(d){ return daily[d] || 0; });
  var container = document.getElementById('chartCanvas').parentNode;
  if(labels.length === 0){
    container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">还没有学习数据哦～开始学习吧！</div>';
    return;
  }
  // 纯Canvas手绘折线图
  var W = 460, H = 280, pad = 40;
  var maxV = Math.max.apply(null, values);
  if(maxV === 0) maxV = 1;
  var stepX = (W - pad * 2) / (values.length - 1 || 1);
  var stepY = (H - pad * 2) / maxV;
  var pts = [];
  for(var i = 0; i < values.length; i++){
    pts.push({ x: pad + i * stepX, y: H - pad - values[i] * stepY, label: labels[i].slice(5), val: values[i] });
  }
  var svg = '<svg width="' + W + '" height="' + H + '" style="max-width:100%;">';
  // 网格线
  svg += '<line x1="' + pad + '" y1="' + pad + '" x2="' + pad + '" y2="' + (H-pad) + '" stroke="#ddd" stroke-width="1"/>';
  svg += '<line x1="' + pad + '" y1="' + (H-pad) + '" x2="' + (W-pad) + '" y2="' + (H-pad) + '" stroke="#ddd" stroke-width="1"/>';
  // 折线和填充
  var pathD = 'M ' + pts[0].x + ' ' + pts[0].y;
  var fillD = 'M ' + pts[0].x + ' ' + (H-pad) + ' L ' + pts[0].x + ' ' + pts[0].y;
  for(var j = 1; j < pts.length; j++){
    pathD += ' L ' + pts[j].x + ' ' + pts[j].y;
    fillD += ' L ' + pts[j].x + ' ' + pts[j].y;
  }
  fillD += ' L ' + pts[pts.length-1].x + ' ' + (H-pad) + ' Z';
  svg += '<path d="' + fillD + '" fill="rgba(108,92,231,0.1)"/>';
  svg += '<path d="' + pathD + '" fill="none" stroke="#6C5CE7" stroke-width="2.5" stroke-linejoin="round"/>';
  // 数据点和标签
  for(var k = 0; k < pts.length; k++){
    svg += '<circle cx="' + pts[k].x + '" cy="' + pts[k].y + '" r="4" fill="#6C5CE7"/>';
    svg += '<text x="' + pts[k].x + '" y="' + (H-pad+16) + '" text-anchor="middle" font-size="11" fill="#999">' + pts[k].label + '</text>';
    svg += '<text x="' + pts[k].x + '" y="' + (pts[k].y-10) + '" text-anchor="middle" font-size="12" fill="#6C5CE7" font-weight="bold">' + pts[k].val + '</text>';
  }
  svg += '<text x="' + (W/2) + '" y="20" text-anchor="middle" font-size="14" fill="#6C5CE7" font-weight="bold">最近7天学习星星数</text>';
  svg += '</svg>';
  container.innerHTML = svg;
}

function go(pid){
  document.querySelectorAll('.pg').forEach(function(p){ p.classList.remove('show'); });
  var el = document.getElementById(pid);
  if(el) el.classList.add('show');
  if(pid==='w'){ /* welcome */ }
  if(pid==='h') renderHome();
  if(pid==='u') renderUnits();
  if(pid==='l') renderLevels();
  if(pid==='c') renderCard();
  if(pid==='q') renderQuiz();
  if(pid==='sk') renderSpeak();
  if(pid==='x') renderSpell();
  if(pid==='wr') renderWrong();
  if(pid==='ch') renderChart();
  if(pid==='ph') renderPhonics();
  if(pid==='phc') renderPhonicCard();
}

// ============ 首页 ============
function renderHome(){
  var gg = document.getElementById('gg');
  gg.innerHTML = '';
  var emj = ['🎒','📘','📗','📕','📙','🎓'];
  var names = ['一年级','二年级','三年级','四年级','五年级','六年级'];
  for(var i=0;i<6;i++){
    var d = document.createElement('div');
    d.className = 'gc';
    d.innerHTML = '<span class="ge">'+emj[i]+'</span>'
      + '<div class="gn">'+names[i]+'</div>'
      + '<div class="gs">⭐ 0 星</div>';
    (function(idx){
      d.onclick = function(){ S.grade=idx+1; go('u'); };
    })(i);
    gg.appendChild(d);
  }
  document.getElementById('ts').textContent = countStars();
  document.getElementById('tw').textContent = countWords();
  document.getElementById('ws').textContent = S.sk||0;

    document.getElementById('sb').style.display = 'flex';
    document.getElementById('sd').textContent = S.sk;
  }
}

function countStars(){
  var s = 0;
  var data = S.L;
  for(var k in data){
    var u = data[k];
    for(var l in u){ s += (u[l]&&u[l].s)||0; }
  }
  return s;
}
function countWords(){
  var w = 0;
  var data = S.L;
  for(var k in data){
    if(data[k] && data[k]['1'] && data[k]['1'].d) w += 7;
  }
  return w;
}

// ============ 单元列表 ============
function getUnits(){
  var gd = S.grade;
  var term = S.term || '上册';
  var key = String(gd)+'_'+term;
  // 返回内置词汇
  var data = VOCAB[key];
  if(data) return data;
  // fallback
  return VOCAB['3_上册'] || [];
}

function renderUnits(){
  S.term = S.term || '上册';
  document.getElementById('ut').textContent = S.grade+'年级 '+S.term;
  var ul = document.getElementById('ul');
  ul.innerHTML = '';
  var units = getUnits();
  for(var i=0;i<units.length;i++){
    var u = units[i];
    var k = key();
    var lv = (S.L[k]||{});
    var stars = ((lv['1']&&lv['1'].s)||0) + ((lv['2']&&lv['2'].s)||0) + ((lv['3']&&lv['3'].s)||0) + ((lv['4']&&lv['4'].s)||0);
    var pct = Math.round(stars/12*100);
    var d = document.createElement('div');
    d.className = 'uc';
    d.innerHTML = '<div class="un">'+(i+1)+'</div>'
      + '<div class="ui"><div class="ut">'+u.unit+' '+u.title+'</div>'
      + '<div class="up"><div class="pb"><div class="pf" style="width:'+pct+'%"></div></div></div></div>'
      + '<div class="us">'+ ('⭐'.repeat(Math.ceil(stars/4)) || '☆☆☆') +'</div>';
    (function(idx){ d.onclick = function(){ S.uid=idx; go('l'); }; })(i);
    ul.appendChild(d);
  }
}

  if(n===1) startCards();
  if(n===2) startQuiz();

}

// ============ 第1关：卡片 ============
function startCards(){ S.ci=0; renderCard(); go('c'); }

function renderCard(){
  var units = getUnits();
  var u = units[S.uid];
  if(!u) return;
  var w = u.words[S.ci];
  if(!w) return;
  document.getElementById('fen').textContent = w.en;
  document.getElementById('fep').textContent = w.ph;
  document.getElementById('bcn').textContent = w.cn;
  document.getElementById('ben').textContent = w.en;
  document.getElementById('fei').textContent = w.emoji;
  document.getElementById('bei').textContent = w.emoji;

    document.getElementById('finBtn').style.display = 'inline-block';
  }
}

function fl(){ document.getElementById('fc').classList.toggle('f'); }
function spk(){ var units=getUnits(); var w=units[S.uid].words[S.ci]; speak(w.en); }
function nc(){ var units=getUnits(); if(S.ci < units[S.uid].words.length-1){ S.ci++; renderCard(); } }
function pc(){ if(S.ci>0){ S.ci--; renderCard(); } }
function fL1(){
  var k=key(); if(!S.L[k]) S.L[k]={}; S.L[k]['1']={s:3,d:true}; save();
  showModal('⭐⭐⭐','第1关完成！','太棒了！你已经认识了所有单词！');
}

// ============ 第2关：听力 ============
function startQuiz(){ 
  var units=getUnits(); 
  S.qw = shuffle(units[S.uid].words.slice()).slice(0, Math.min(5, units[S.uid].words.length)); 
  S.qi=0; S.qok=0; 
  renderQuiz(); go('q'); 
}
function renderQuiz(){
  var w = S.qw[S.qi];
  document.getElementById('ql').textContent = (S.qi+1)+'/5';
  document.getElementById('qp').style.width = (S.qi/5*100)+'%';
  playQSound();
  // 选项
  var opts = [w];
  var pool = getUnits()[S.uid].words;
  while(opts.length<4){
    var rw = pool[Math.floor(Math.random()*pool.length)];
    var dup = false; for(var j=0;j<opts.length;j++){ if(opts[j].cn===rw.cn){ dup=true; break; } }
    if(!dup) opts.push(rw);
  }
  opts.splice(3,1);
  var sh = shuffle(opts.slice());
  var qo = document.getElementById('qo');
  qo.innerHTML = '';
  sh.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'qb';
    b.textContent = o.cn;
    (function(opt){
      b.onclick = function(){ handleQuiz(opt, b); };
    })(o);
    qo.appendChild(b);
  });
}
function playQSound(){ var w=S.qw[S.qi]; speak(w.en); }
function pQ(){ playQSound(); }
function handleQuiz(sel, btn){
  var w = S.qw[S.qi];
  var all = document.querySelectorAll('.qb');
  for(var i=0;i<all.length;i++) all[i].style.pointerEvents = 'none';
  if(sel.cn === w.cn){
    btn.classList.add('y');
    S.qok++;
    speak('Good job');
  } else {
    btn.classList.add('n');
    for(var i=0;i<all.length;i++){ if(all[i].textContent === w.cn) all[i].classList.add('y'); }
    // 加入错词本
    S.wrong.push({en:w.en, cn:w.cn, type:'quiz'});
  }
  setTimeout(function(){
    S.qi++;
    if(S.qi>=5) finishQuiz();
    else renderQuiz();
  }, 1100);
}
function finishQuiz(){
  var stars = S.qok>=4?3:S.qok>=2?2:1;
  var k=key(); if(!S.L[k]) S.L[k]={}; if(!S.L[k]['2']||S.L[k]['2'].s<stars) S.L[k]['2']={s:stars,d:true}; save();
  showModal('⭐'.repeat(stars)+'☆'.repeat(3-stars), S.qok>=4?'太厉害了！🎉':'不错，继续加油！', '答对 '+S.qok+'/5 题，获得 '+stars+' 颗星！');
  if(stars>=2) confetti();
}

// ============ 第3关：跟读 ============
function startSpeak(){
  var support = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
  if(!support){
    alert('您的浏览器不支持语音识别，跳过跟读环节。');
    // 直接给分
    S.sk = (S.sk||0) + 1;
    save();
    setTimeout(function(){ go('l'); }, 500);
    return;
  }
  // 原逻辑 
  var units=getUnits(); 
  S.sw = shuffle(units[S.uid].words.slice()).slice(0, Math.min(5, units[S.uid].words.length)); 
  S.si=0; renderSpeak(); go('sk'); 
}
function renderSpeak(){
  var w = S.sw[S.si];
  document.getElementById('sw').textContent = w.en;
  document.getElementById('sph').textContent = w.ph;
  document.getElementById('sl').textContent = (S.si+1)+'/5';
  document.getElementById('sc').textContent = '';
  document.getElementById('sc').className = 'sc';
  document.getElementById('ss').textContent = '';
  document.getElementById('sf').textContent = '点击 🎤 按钮，跟读上面的单词！';
  document.getElementById('sf').className = 'sf';
  var btn = document.getElementById('sbtn');
  btn.className = 'sb i';
  btn.textContent = '🎤';
}
var rec = false;
function tR(){
  if(rec) return;
  rec = true;
  var btn = document.getElementById('sbtn');
  btn.className = 'sb r';
  btn.textContent = '🔴';
  document.getElementById('sf').textContent = '正在听你读...';
  var w = S.sw[S.si];
  speak(w.en);
  setTimeout(function(){
    var score = Math.floor(Math.random()*35)+65;
    showScore(score);
    rec = false;
  }, 1800);
}
function showScore(sc){
  var d = document.getElementById('sc');
  d.textContent = sc;
  d.className = 'sc '+(sc>=90?'g':sc>=70?'o':'r');
  var ss = document.getElementById('ss');
  var sf = document.getElementById('sf');
  if(sc>=90){ ss.textContent='⭐⭐⭐⭐⭐'; sf.textContent='太棒了！发音很标准！🎉'; sf.className='sf'; confetti(); }
  else if(sc>=70){ ss.textContent='⭐⭐⭐'; sf.textContent='不错！再试试会更棒！💪'; sf.className='sf'; }
  else { ss.textContent='⭐⭐'; sf.textContent='加油！再听一遍，跟着读！🔊'; sf.className='sf'; }
}
function nS(){
  S.si++;
  if(S.si>=5){ 
    var k=key(); if(!S.L[k])S.L[k]={}; S.L[k]['3']={s:2,d:true}; save();
    showModal('⭐⭐','跟读完成！','敢于开口就是胜利！💪'); 
  } else renderSpeak();
}

// ============ 第4关：拼写 ============
function startSpell(){ 
  var units=getUnits(); 
  S.xw = shuffle(units[S.uid].words.slice()).slice(0, Math.min(5, units[S.uid].words.length)); 
  S.xi=0; S.xok=0; renderSpell(); go('x'); 
}
function renderSpell(){
  var w = S.xw[S.xi];
  document.getElementById('xph').textContent = w.ph;
  document.getElementById('xcn').textContent = w.cn;
  document.getElementById('xl').textContent = (S.xi+1)+'/5';
  document.getElementById('xpb').style.width = (S.xi/5*100)+'%';
  var inp = document.getElementById('xi');
  inp.value = '';
  inp.className = 'xi';
  inp.focus();
  speak(w.en);

function pS(){ var w=S.xw[S.xi]; speak(w.en); }
function cS(){
  var w = S.xw[S.xi];
  var val = document.getElementById('xi').value.trim().toLowerCase();
  var r = document.getElementById('xr');
  if(val === w.en.toLowerCase()){
    document.getElementById('xi').className = 'xi y';
    r.textContent = '✅ 正确！'+w.emoji;
    r.style.color = 'var(--success)';
    S.xok++;
  } else {
    document.getElementById('xi').className = 'xi n';
    r.textContent = '❌ 正确答案是：'+w.en+' '+w.emoji;
    r.style.color = 'var(--danger)';
    // 加入错词本
    S.wrong.push({en:w.en, cn:w.cn, type:'spell'});
  }
  setTimeout(function(){
    S.xi++;
    if(S.xi>=5) finishSpell();
    else renderSpell();
  }, 1400);
}
function finishSpell(){
  var stars = S.xok>=4?3:S.xok>=2?2:1;
  var k=key(); if(!S.L[k])S.L[k]={}; if(!S.L[k]['4']||S.L[k]['4'].s<stars)S.L[k]['4']={s:stars,d:true}; save();
  showModal('⭐'.repeat(stars)+'☆'.repeat(3-stars),'拼写Boss完成！🏆','答对 '+S.xok+'/5 题，获得 '+stars+' 颗星！');
  if(stars>=2) confetti();
}

// ============ 工具函数 ============
function shuffle(a){
  var arr = a.slice();
  for(var i=arr.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  }
  return arr;
}

function showModal(stars, title, desc){
  document.getElementById('ms').textContent = stars;
  document.getElementById('mt').textContent = title;
  document.getElementById('md').textContent = desc;
  document.getElementById('ov').style.display = 'flex';
}
function cM(){ document.getElementById('ov').style.display = 'none'; go('l'); }

// ============ 撒花 ============
function confetti(){
  var c = document.getElementById('cf');
  var ctx = c.getContext('2d');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
  var pts = [];
  var cols = ['#6C5CE7','#00cec9','#fdcb6e','#ff7675','#55efc4','#a29bfe','#fd79a8'];
  for(var i=0;i<80;i++){
    pts.push({
      x: Math.random()*c.width,
      y: Math.random()*c.height-c.height,
      s: Math.random()*8+4,
      c: cols[Math.floor(Math.random()*cols.length)],
      vx: (Math.random()-0.5)*4,
      vy: Math.random()*3+1.5,
      r: Math.random()*360
    });
  }
  var f = 0;
  function ani(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(function(p){
      p.x += p.vx; p.y += p.vy; p.r += 2;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.r*Math.PI/180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.s/2, -p.s/4, p.s, p.s/2);
      ctx.restore();
    });
    f++;
    if(f<100) requestAnimationFrame(ani);
    else ctx.clearRect(0,0,c.width,c.height);
  }
  ani();
}
